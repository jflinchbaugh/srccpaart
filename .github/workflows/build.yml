name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Validate event/billboard data
        run: |
          pip install pyyaml
          python3 scripts/validate-data.py

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: '0.164.0'
          extended: true

      - name: Build site
        run: |
          hugo --minify 2>&1 | tee build.log
          if grep -q "missing image" build.log; then
            echo "::error::Build referenced one or more missing images - see log above"
            exit 1
          fi
