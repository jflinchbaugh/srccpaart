description: '<p><strong><span style="color: rgb(0, 0, 0)">AN EVENING WITH BIG BLITZ AT SRCC STUDIOS</span></strong></p><p><br></p><p><em><span style="color: rgb(0, 0, 0)">On September 18th, BIG BLITZ will be bringing their talents to SRCC Studios.&nbsp;</span></em></p><p><br></p><p><span style="color: rgb(0, 0, 0)">SRCC is thrilled to announce one of our biggest shows yet: BIG BLITZ.&nbsp;</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">Hailing from Pittsburgh, PA, BIG BLITZ combines dance, jazz, rock, and electronic musical influences to create their own dynamic sound. Brothers Lucas Ciesielski (Tenor Sax, Bari Sax) and Mason Ciesielski (Tenor Sax, Bari Sax, Synthesizers) unite with drummer Nick Grabigel to forge their unique, infectious style. The trio’s chemistry, energy, and stage presence makes dancing mandatory, rather than optional. Their meld of vintage instruments with modern technology consistently mesmerizes audiences and delivers a huge, hard-hitting sound that will create an unforgettable show.</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">The event takes place at 7:00 at Susquehanna River Creative Conspiracy (SRCC) — supporting local art, music, and creative community along the Susquehanna.</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">$15 tickets. Come appreciate local live music. Feel the vibe. Join the conspiracy.&nbsp;</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to </span><span style="color: rgb(8, 8, 9)">“Elevating community through the arts.”</span><span style="color: rgb(0, 0, 0)"> SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm.</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">Join the conspiracy! </span><a target="_blank" rel="noopener noreferrer nofollow" href="http://SRCCPAART.ORG"><span style="color: rgb(0, 0, 0)">SRCCPAART.ORG</span></a><span style="color: rgb(0, 0, 0)">.</span></p><p><br><br></p>'
