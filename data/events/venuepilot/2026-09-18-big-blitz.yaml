description: '<p>AN EVENING WITH BIG BLITZ AT SRCC STUDIOS</p><p><br></p><p>On September 18th, BIG BLITZ will be bringing their talents to SRCC Studios.&nbsp;</p><p><br></p><p>SRCC is thrilled to announce one of our biggest shows yet: BIG BLITZ.&nbsp;</p><p><br></p><p>Hailing from Pittsburgh, PA, BIG BLITZ combines dance, jazz, rock, and electronic musical influences to create their own dynamic sound. Brothers Lucas Ciesielski (Tenor Sax, Bari Sax) and Mason Ciesielski (Tenor Sax, Bari Sax, Synthesizers) unite with drummer Nick Grabigel to forge their unique, infectious style. The trio’s chemistry, energy, and stage presence makes dancing mandatory, rather than optional. Their meld of vintage instruments with modern technology consistently mesmerizes audiences and delivers a huge, hard-hitting sound that will create an unforgettable show.</p><p><br></p><p>The event takes place at 7:00 at Susquehanna River Creative Conspiracy (SRCC) — supporting local art, music, and creative community along the Susquehanna.</p><p><br></p><p>$15 tickets. Come appreciate local live music. Feel the vibe. Join the conspiracy.&nbsp;</p><p><br></p><p>Join the conspiracy! SRCCPAART.ORG.</p><p><br><br></p>'
