description: '<p><strong><span style="color: rgb(255, 255, 255)">PUNK ROCK NIGHT AT SRCC: 7/10</span></strong></p><p><br></p><p><em><span style="color: rgb(255, 255, 255)">PUNK ROCKERS, UNITE! Carrousel, Addled Brains, Jay Veil— all on the same bill.&nbsp;</span></em></p><p><br></p><p><span style="color: rgb(255, 255, 255)">Join us on July 10th at Susquehanna River Creative Conspiracy Studios for a star-studded lineup. If you are a fan of punk rock, you are not going to want to miss this one.&nbsp;</span></p><p><br></p><p><strong><span style="color: rgb(255, 255, 255)">Carrousel</span></strong><span style="color: rgb(255, 255, 255)"> will be headlining the event. Listeners can expect to hear an extremely fast-paced, aggressive sound mixed with vociferous vocals. Carrousel is described as hardcore punk, but you just might have to see it (and hear it) to really believe it.&nbsp;</span></p><p><br></p><p><strong><span style="color: rgb(255, 255, 255)">Addled Brains</span></strong><span style="color: rgb(255, 255, 255)"> will take the stage before Carrousel. Addled Brains are Central Pennsylvania political streetpunk. Expect aggressive songs promoting community, equity, activism and awareness.</span></p><p><br></p><p><span style="color: rgb(255, 255, 255)">Kicking off the night is </span><strong><span style="color: rgb(255, 255, 255)">Jay Veil</span></strong><span style="color: rgb(255, 255, 255)">: “Raw punk rock.”&nbsp;</span></p><p><br></p><p><span style="color: rgb(255, 255, 255)">The event takes place at 7:00 at Susquehanna River Creative Conspiracy (SRCC) — supporting local art, music, and creative community along the Susquehanna.</span></p><p><br></p><p><span style="color: rgb(255, 255, 255)">$15 tickets. Come appreciate local live music. Feel the vibe. Join the conspiracy.&nbsp;</span></p><p><br></p><p><span style="color: rgb(255, 255, 255)">Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community by facilitating creative endeavors and welcoming all to find inspiration and connection in the process." SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm.</span></p><p><br></p><p><span style="color: rgb(255, 255, 255)">Join the conspiracy! </span><a target="_blank" rel="noopener noreferrer nofollow" href="http://SRCCPAART.ORG"><span style="color: rgb(255, 255, 255)">SRCCPAART.ORG</span></a><span style="color: rgb(255, 255, 255)">.</span></p><p><br></p>'
