description: <p>Are you an artist/creative? Life seems to be running in circles? Knowing how crazy the world is right now, sometimes as artists we feel alone, uninspired and questioning every brush stroke, pencil line and unformed lump of clay.</p><p></p><p>The SRCC is a group of artists/creatives who have all "been there".<br>Being an artist is often romanticized, but the reality is a demanding, high-stakes endeavor that merges intense emotional vulnerability with financial instability and relentless labor. It is a path that requires not only technical skill but also immense resilience, as artists frequently navigate self-doubt, isolation, and constant, often harsh, criticism. We are on a mission to create a circle of community among artists who support each other.</p><p></p><p>The SRCC is proud to host local Artist, Psychologist and Art Therapist Ericka Snitzer, LAPC for our new monthly support group for artists.</p><p>The group will meet on Sunday, April 26 from 5:30 - 6:30</p><p>Erika Snitzer, LAPC received her Master's Degree in Clinical Mental Health Counseling from Adler University, Chicago, Illinois. She attended Meredith College in Raleigh, North Carolina, where she graduated with a Bachelor's Degree in Psychology and Art Therapy. Erika has developed a unique perspective on life, and she takes a flexible, creative approach to counseling. She meets people with genuine curiosity and strives to understand them and their lived experiences.</p><p></p><p>Creative Circle at the SRCC will be a mutual support group made up of artists and creatives, facilitated by Erika. This group is designed to build community and nurture the emotional well-being, professional growth, and creative resilience of artists. Together we will create a safe, inclusive space where artists can share experiences, exchange resources and receive encouragement to sustain their artistic practice.</p><p></p>
