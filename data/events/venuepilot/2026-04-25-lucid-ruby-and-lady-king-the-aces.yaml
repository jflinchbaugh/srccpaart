description: <p>PARTY WITH THE LOCALS</p><p><br></p><p><em>One night, FOUR local bands.&nbsp;</em></p><p><br></p><p>Join us at Hempfield Apothetique in Lancaster on April 25th for a fantastic night of local music featuring Lady King &amp; The Aces, Lucid Ruby, The Screaming Eyeballs and Foolsdog.&nbsp;</p><p><br></p><p><strong>Lady King &amp; The Aces</strong>, who were recently nominated for the CPMAs “Best New Band” award, will be co-headlining the show. Self-described as "high-energy-psychedelic-rock," LKATA draws influence from rock, funk, jazz and more. In their first full year as a band, they released their self-titled debut album— on July 4th, 2025. This album proves that this rising quintet’s music utterly defies genres. Their mix of styles is sure to keep any audience on its toes.&nbsp;</p><p><br></p><p><strong>Lucid Ruby</strong> will be co-headlining the set. Their music blends imagery-packed pop-punk with emotionally charged alt-rock, delivering undeniably catchy lyrics and energized instrumentation.&nbsp;</p><p><br></p><p><strong>The Screaming Eyeballs</strong> are up before Lucid Ruby. They’re an indie rock band, known to be “a funny wacky time!”&nbsp;</p><p><br></p><p><strong>Foolsdog</strong> will kick things off. To find out what these dogs sound like, you better come out early.&nbsp;</p><p><br></p><p>The event takes place at 6:00 at Hempfield Apothetique in Lancaster, presented by SRCC— supporting local art, music, and creative community along the Susquehanna.</p><p><br></p><p>Hempfield Apothetique is one of the only cannabis consumption lounges in the state, so get ready to get elevated. Must be 21 years of age or older to attend.&nbsp;</p><p><br></p><p>$15 tickets. Come appreciate local live music. Feel the vibe. Join the conspiracy.&nbsp;</p><p><br></p><p>Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community by facilitating creative endeavors and welcoming all to find inspiration and connection in the process." SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm.</p><p><br></p><p>Join the conspiracy! SRCCPAART.ORG.</p><p><br></p>
