description: <p><strong>THROWDOWN AT SRCC Studios!</strong></p><p><br></p><p>It’s going to get heavy…&nbsp;</p><p><br></p><p>On Friday, May 8th, Susquehanna River Creative Conspiracy will host an All-Star lineup of local rock bands. If you are a fan of progressive rock, you’re not going to want to miss this one.&nbsp;</p><p><br></p><p>Samaritan Snare, recent winners of the CPMAs Award for Best EP of the Year, will be headlining the show. They’re joined by local stalwarts The Depth Beneath Us and Screen Shot.&nbsp;</p><p><br></p><p>Samaritan Snare is a progressive Post Hardcore outfit hailing from Lancaster, PA. Their debut EP, Living Statue, showcases their penchant for bridging the gap in sound between a serene water level and the most punishing final boss battle of your favorite video game. Let them take you on a journey through the depths of your subconscious, weaving together nostalgic avenues and boundary-pushing boulevards to map their way into your memory.</p><p><br></p><p>Before the headliners, don’t miss The Depth Beneath Us. Based out of Harrisburg, The Depth Beneath Us are masters of atmosphere and layering. They combine post-metal structures, progressive melodies, and emotive songwriting to make sweeping songs that build truly orchestral passages and crescendos.&nbsp;</p><p><br></p><p>Kicking off the night is Screen Shot. They are a progressive hard rock collective based in Lancaster, PA. Blending prog, punk, and psychedelia with experimental sounds, the group creates tension through contrasting slow, sonic ambience with fast, aggressive dissonance; all&nbsp; while pushing melody and feeling to the forefront.</p><p><br></p><p>The event takes place at 7:00 at Susquehanna River Creative Conspiracy (SRCC) — supporting local art, music, and creative community along the Susquehanna.</p><p><br></p><p>$15 tickets. Come appreciate local live music. Feel the vibe. Join the conspiracy.&nbsp;</p><p><br></p><p>Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community by facilitating creative endeavors and welcoming all to find inspiration and connection in the process." SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm.</p><p><br></p><p>Join the conspiracy! SRCCPAART.ORG.</p><p><br></p>
