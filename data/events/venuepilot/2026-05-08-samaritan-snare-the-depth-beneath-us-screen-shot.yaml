description: '<p><strong><span style="color: rgb(0, 0, 0)">THROWDOWN AT SRCC Studios!</span></strong></p><p><br></p><p><em><span style="color: rgb(0, 0, 0)">It’s going to get heavy…&nbsp;</span></em></p><p><br></p><p><span style="color: rgb(0, 0, 0)">On Friday, May 8th, Susquehanna River Creative Conspiracy will host an All-Star lineup of local rock bands. If you are a fan of progressive rock, you’re not going to want to miss this one.&nbsp;</span></p><p><br></p><p><strong><span style="color: rgb(0, 0, 0)">Samaritan Snare</span></strong><span style="color: rgb(0, 0, 0)">, recent winners of the CPMAs Award for </span><em><span style="color: rgb(0, 0, 0)">Best EP of the Year</span></em><span style="color: rgb(0, 0, 0)">, will be headlining the show. They’re joined by local stalwarts </span><strong><span style="color: rgb(0, 0, 0)">The Depth Beneath Us </span></strong><span style="color: rgb(0, 0, 0)">and </span><strong><span style="color: rgb(0, 0, 0)">Screen Shot.&nbsp;</span></strong></p><p><br></p><p><span style="color: rgb(0, 0, 0)">Samaritan Snare is a progressive Post Hardcore outfit hailing from Lancaster, PA. Their debut EP, </span><em><span style="color: rgb(0, 0, 0)">Living Statue</span></em><span style="color: rgb(0, 0, 0)">, showcases their penchant for bridging the gap in sound between a serene water level and the most punishing final boss battle of your favorite video game. Let them take you on a journey through the depths of your subconscious, weaving together nostalgic avenues and boundary-pushing boulevards to map their way into your memory.</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">Before the headliners, don’t miss The Depth Beneath Us. Based out of Harrisburg, The Depth Beneath Us are masters of atmosphere and layering. They combine post-metal structures, progressive melodies, and emotive songwriting to make sweeping songs that build truly orchestral passages and crescendos.&nbsp;</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">Kicking off the night is Screen Shot. They are a progressive hard rock collective based in Lancaster, PA. Blending prog, punk, and psychedelia with experimental sounds, the group creates tension through contrasting slow, sonic ambience with fast, aggressive dissonance; all&nbsp; while pushing melody and feeling to the forefront.</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">The event takes place at 7:00 at Susquehanna River Creative Conspiracy (SRCC) — supporting local art, music, and creative community along the Susquehanna.</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">$15 tickets. Come appreciate local live music. Feel the vibe. Join the conspiracy.&nbsp;</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community by facilitating creative endeavors and welcoming all to find inspiration and connection in the process." SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm.</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">Join the conspiracy! </span><a target="_blank" rel="noopener noreferrer nofollow" href="http://SRCCPAART.ORG"><span style="color: rgb(0, 0, 0)">SRCCPAART.ORG</span></a><span style="color: rgb(0, 0, 0)">.</span></p><p><br></p>'
