description: '<h2 style="text-align: start"><strong>Solstice Circus (SRCC Studios Fundraiser)</strong></h2><p></p><p><strong>Step into Solstice Circus 🌞🎪</strong> and help keep SRCC Studios buzzing with art, music, and shared imagination.</p><p></p><p>Your gift will gain you admission and support <strong>welcoming creative spaces</strong> where community meets, make things, and connects. Every donation helps cover studio time, community workshops, and supplies so more people can explore their creativity together.</p><p></p><p><strong>Give what feels right</strong> and stand with a community that believes creativity can bring people closer.</p><p></p><p>This amazing event will feature live music from 25+ local musicians, artisan vendors, food and drinks, a silent art auction, face painting and more! Our family friendly Solstice Circus will be held from 2 to 8 p.m. and with a minimum donation of $15 for entry.<br><br>As you know, we recently became a non-profit, and that means we need to raise funds to keep bringing arts programming, concerts and more to our local community. Right now, we’re searching for more vendors to add to our lineup, so comment below if you’re interested - or tag someone you think should see this! More details and tickets will be available soon. See you at the Solstice Circus on June 28</p>'
