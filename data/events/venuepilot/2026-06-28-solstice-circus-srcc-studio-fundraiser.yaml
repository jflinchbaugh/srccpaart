description: '<h2 style="text-align: start"><strong>Solstice Circus (SRCC Studios Fundraiser)</strong></h2><p></p><p><strong>Step into Solstice Circus 🌞🎪</strong> and help keep SRCC Studios buzzing with art, music, and shared imagination.</p><p></p><p>Your gift will gain you admission and support <strong>welcoming creative spaces</strong> where community meets, make things, and connects. Every donation helps cover studio time, community workshops, and supplies so more people can explore their creativity together.</p><p></p><p><strong>Give what feels right</strong> and stand with a community that believes creativity can bring people closer.</p><p></p><p>You are invited to the Solstice Circus, a unique community fundraiser happening Sunday, June 28th 2-8pm at the SRCC Studios in Columbia.</p><p>This family-friendly event will bring together many of the musicians, artists, and creative collaborators who make up the SRCC family for a full day of live performances, community connection, and celebration featuring 9 local original bands and 5 solo artists! What makes this event especially unique is that every performance will take place in an intimate live studio audience setting, professionally recorded as part of an ongoing effort to showcase and preserve the incredible musical talent that calls our creative community home.</p><p></p><p>A suggested donation of $15 gets you an incredible non-stop lineup of 9 local original bands and 5 solo artists between two stages!</p><p></p><p>In addition you''ll find:</p><p></p><p>• Artisan vendors featuring handmade and locally crafted goods!<br>• Award-winning barbecue from the winner of Lancaster County''s Best Food Truck Competition: Mad BBQ!<br>• Refreshing mocktails and dirty sodas from Twistys Mobile Bar!<br>• Interactive arts experiences and creative activities<br>• A welcoming atmosphere for all ages</p><p></p><p>Every admission donation directly supports SRCC''s mission to provide accessible arts, music, and community programming while helping us continue to grow as a creative hub for our region.</p><p></p><p>Whether you''ve attended a concert, participated in a workshop, volunteered, or simply followed along with what we''re building, we''d love to celebrate the summer solstice season with you.</p><p>Come experience the music, support local artists, enjoy amazing food, and be part of something truly special.</p><p></p><p>We can''t wait to see you there.</p><p></p><p>With gratitude,</p><p></p><p>The Susquehanna River Creative Conspiracy</p><p></p><p>"Elevating community through the arts."</p><p></p><p>Admission to our live studio is limited. Secure your spot in advance at <a target="_blank" rel="noopener noreferrer nofollow" href="http://www.srccpaart.org"><strong>www.srccpaart.org</strong></a> scroll down and select "ADMISSION DONATION"</p><p></p><p>Free parking on Lancaster Ave and the surrounding neighborhoods.</p><p></p><p>Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community through the arts." SRCC offers affordable fully equipped music and art studio space and more. Studio open mic nights every Tuesday, 7–10 pm</p>'
