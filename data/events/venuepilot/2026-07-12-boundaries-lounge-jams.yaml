description: <p>Every second Sunday of the month at 3 PM</p><p>The Boundary Lounge is a space for musicians who want to explore musicality in a collaborative group jamming environment. The emphasis is on relaxed Sunday afternoon lounge vibes; Collaborative jamming, jazz standards, and musical experiments.</p><p></p><p>If you have a song, musical idea, or pet progression that you would like to hear brought to life, bring it on in. A large band-facing projection screen for images or music is provided. Vocalists, horn players and all other instrumentalists very much invited. Come join the fun, or come to listen to the players decorate time.</p><p></p><p>Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community through the arts."</p><p></p><p>SRCC offers an affordable fully equipped music and art studio space and more.</p><p></p><p>Join our open mic and open art in our studios every Tuesday, 7–10 pm!</p><p></p><p>SRCCPAART.ORG </p>
