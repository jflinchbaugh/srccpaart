description: <p>This jam session, hosted by Tom Hopkins, is designed for adventurous solo musicians looking to develop their skills in a group setting. Musicians of all experience levels are welcome to learn the fundamentals of playing with others through guided songs and collaborative performance. Experienced players help newer jammers build confidence, improve communication, and understand group dynamics in a supportive environment. This event is held on the second Tuesday of each month.</p>
