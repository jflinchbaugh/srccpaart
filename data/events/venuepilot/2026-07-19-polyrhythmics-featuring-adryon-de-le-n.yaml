description: '<p>An Evening With Polyrhythmics Featuring Adryon de León&nbsp;</p><p></p><p></p><p>SRCC Presents… Our Biggest Show Yet. Hailing all the way from Seattle, Polyrhythmics featuring Adryon de León are ready to rock out at The Lounge at Hempfield Apothetique.&nbsp;</p><p></p><p></p><p>We invite you to join us on July 19th for what is sure to be an unforgettable night of music as Polyrhythmics featuring Adryon de León come to Lancaster, Pa. to play in the area’s newest, coolest venue: The Lounge at Hempfield Apothetique.&nbsp;</p><p></p><p></p><p>Polyrhythmics sound originated in Seattle’s underground deep funk scene combining impossibly tight grooves with bold brass and hypnotic percussion that showcased elements of R&amp;B, progressive jazz, and Afrobeat which defined the instrumental group’s early era sound.&nbsp;&nbsp;</p><p></p><p></p><p>Now on their thirteenth year as a recording project and touring ensemble, the band’s sound continues to evolve following six full length albums, several EPs and live releases. The virtuosic musicianship and musical conversation built on a relentless touring schedule of the previous decade has led them to a brand of psych-funk that fills a room with an impending mood where anything could happen - sometimes evoking their brighter and cinematic Fela-influences, but also a more sinister and darker turn toward a more progressive sonic palette.</p><p></p><p></p><p>Adryon de León will be joining Polyrhythmics on vocals. León (who grew up in Ojai, CA) is a featured principal vocalist/performer for the Disneyland Resort, and has performed background vocals for Macy Gray, Patti Austin, The Growlers, and George Clinton. In 2013, she joined the acclaimed Los Angeles-based soul &amp; funk group Orgone. Orgone’s release, Reasons, features tracks spotlighting de León in a main writing and collaborative role.<br></p><p></p><p>Doors open at 7:00 at Hempfield Apothetique in Lancaster. The show is presented by SRCC— supporting local art, music, and creative community along the Susquehanna.</p><p></p><p></p><p>Hempfield Apothetique is one of the only cannabis consumption lounges in the state, so get ready to get elevated. Must be 21 years of age or older to attend.&nbsp;</p><p></p><p></p><p>$20 tickets. Come appreciate local live music. Feel the vibe. Join the conspiracy.&nbsp;</p><p></p><p></p><p>Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community by facilitating creative endeavors and welcoming all to find inspiration and connection in the process." SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm.</p><p></p><p></p><p>Join the conspiracy! SRCCPAART.ORG.</p><p><br><br></p>'
