description: <p>Ever wondered what really happens behind the mixing board at a live show?</p><p></p><p>Join SRCC every Tuesday this July for our Live Sound Workshop hosted by Steve Meyer. This hands-on crash course will teach you the fundamentals of running live audio for concerts, open mics, and events in a real-world music environment.</p><p></p><p>Participants will learn:</p><p>• Mixer operation</p><p>• Microphone setup</p><p>• EQ fundamentals</p><p>• Stage setup and signal flow</p><p>• Troubleshooting common live sound issues</p><p>• And more</p><p>Whether you’re a musician looking to run your own gigs, an aspiring sound engineer, or just curious about what makes a live show sound great, this workshop is designed to get you comfortable behind the board.</p><p></p><p>The full 4-week workshop will be held on:</p><p>July 7th</p><p>July 14th&nbsp;</p><p>July 21st</p><p>July 28th</p><p></p><p></p><p>Only 5 spots remain, and they’re going fast.</p><p></p><p>For more information or to reserve your spot, contact Steve directly or message SRCC.</p><p>Steven Meyer</p><p>570-554-3165</p><p></p>
