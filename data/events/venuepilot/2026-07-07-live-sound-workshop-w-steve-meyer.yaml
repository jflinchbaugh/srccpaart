description: '<p><span style="color: rgb(8, 8, 9)">Ever wondered what really happens behind the mixing board at a live show?</span></p><p></p><p><span style="color: rgb(8, 8, 9)">Join SRCC every Tuesday this July for our Live Sound Workshop hosted by Steve Meyer. This hands-on crash course will teach you the fundamentals of running live audio for concerts, open mics, and events in a real-world music environment.</span></p><p></p><p><span style="color: rgb(8, 8, 9)">Participants will learn:</span></p><p><span style="color: rgb(8, 8, 9)">• Mixer operation</span></p><p><span style="color: rgb(8, 8, 9)">• Microphone setup</span></p><p><span style="color: rgb(8, 8, 9)">• EQ fundamentals</span></p><p><span style="color: rgb(8, 8, 9)">• Stage setup and signal flow</span></p><p><span style="color: rgb(8, 8, 9)">• Troubleshooting common live sound issues</span></p><p><span style="color: rgb(8, 8, 9)">• And more</span></p><p><span style="color: rgb(8, 8, 9)">Whether you’re a musician looking to run your own gigs, an aspiring sound engineer, or just curious about what makes a live show sound great, this workshop is designed to get you comfortable behind the board.</span></p><p></p><p><span style="color: rgb(8, 8, 9)">The full 4-week workshop will be held on:</span></p><p>July 7th</p><p>July 14th&nbsp;</p><p>July 21st</p><p>July 28th</p><p><span style="color: rgb(8, 8, 9)"> </span></p><p></p><p><span style="color: rgb(8, 8, 9)">Only 5 spots remain, and they’re going fast.</span></p><p></p><p><span style="color: rgb(8, 8, 9)">For more information or to reserve your spot, contact Steve directly or message SRCC.</span></p><p><span style="color: rgb(8, 8, 9)">Steven Meyer</span></p><p><span style="color: rgb(8, 8, 9)">570-554-3165</span></p><p></p>'
