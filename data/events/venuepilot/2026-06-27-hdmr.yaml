description: <p><strong>HDMR ALL SET FOR SRCC</strong></p><p></p><p>Come on out on Saturday June 27 at 7 p.m. to catch HDMR’s debut performance at SRCC. Hailing from Elizabethtown, PA, HDMR has been electrifying the local music scene since 2019.<br></p><p><strong>HDMR</strong> is an alternative rock group based out of Elizabethtown, PA. The group has been playing out on various stages across Chester and Lancaster County since 2019. Their set list includes cover songs from groups such as Neil Young, Tom Petty, Red Hot Chili Peppers and many more. They will also be playing songs from HDMR’s self titled debut album that was released in June of 2025. Come out and enjoy the raw and powerful sounds from HDMR at SRCC on Saturday, June 27th. If you like rock and roll, this is a night that can’t be missed!</p><p></p><p>The event takes place at 7:00 at Susquehanna River Creative Conspiracy (SRCC) — supporting local art, music, and creative community along the Susquehanna.&nbsp;</p><p></p><p>$15 tickets. Come appreciate local live music. Feel the vibe. Join the conspiracy.&nbsp;<br></p><p>Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community by facilitating creative endeavors and welcoming all to find inspiration and connection in the process." SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm.</p><p><br></p><p>Join the conspiracy! SRCCPAART.ORG.</p><p><br></p>
