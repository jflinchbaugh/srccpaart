description: '<p>Flux Capacitor is taking over Weyerbacher in Allentown on June 13th, and before they melt the stage, three bands are stepping into the ring for the 2026 Karnival of the Arts Battle of the Bands Final!</p><p></p><p>SEVEN • ACT CASUAL • LOVERMIND</p><p>Three bands. One KOTA East lineup spot.</p><p></p><p>Help choose the playing order by using one of the promo codes below when you grab your ticket. The band with the most promo code uses plays last. Support up-and-coming bands, save a couple bucks, and help your favorite act earn the closing battle slot.</p><p></p><img src="https://static.xx.fbcdn.net/images/emoji.php/v9/t2d/1/16/1f4cd.png" alt="📍"><p> Weyerbacher</p><p>448 N 17th St, Allentown, PA 18104</p><p></p><p>June 13th</p><p>Doors: 4:30 PM</p><p>Battle: 5–8 PM</p><p>Flux Capacitor: 8 PM</p><p></p><p>Promo Codes:</p><p>SEVEN</p><p>ACTCASUAL</p><p>LOVERMiND</p><p></p><p>All ages. Under 18 with adult. 21+ to drink.</p><p>Come early. Vote with your ticket. Back your band. Stay for Flux.</p><p>The winner plays Karnival of the Arts East 2026.</p>'
