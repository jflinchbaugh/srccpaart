description: '<p><strong><span style="color: rgb(0, 0, 0)">SRCC Presents: FLUX CAPACITOR</span></strong></p><p></p><p><em><span style="color: rgb(0, 0, 0)">Great Scott! Flux Capacitor is coming to SRCC.</span></em></p><p></p><p><span style="color: rgb(0, 0, 0)">“I don’t believe it!” Well, believe it. It’s happening. On July 23rd, Flux Capacitor is coming to SRCC. And We. Are. </span><em><span style="color: rgb(0, 0, 0)">Psyched!!&nbsp;</span></em></p><p></p><p><span style="color: rgb(0, 0, 0)">They’ll be joined by local-rockers Lady King &amp; The Aces, who will be kicking off the show.&nbsp;</span></p><p></p><p><span style="color: rgb(0, 0, 0)">Flux Capacitor is known for melding energetic, spacy improvisation with electronica and melodic rock songwriting. They spent the early 2010s building a grassroots fan base through constant touring and a series of vibrant studio albums including their 2011 Jack Endino-produced sophomore outing, Monolith. A staple of the jam band circuit, Flux Capacitor pull from a wide range from tonal influences, from Phish and Bob Marley to more sonically cerebral acts like Pink Floyd and Radiohead</span></p><p></p><p><span style="color: rgb(0, 0, 0)">Formed in West Reading, Pennsylvania in 2007 by brothers Peter (vocals, guitar), Michael (keys), and Jason Specht (drums), Flux Capacitor cut their teeth regionally, issuing their debut, They Know We Know, before hitting the road nationally. With their profile raised, the trio headed to Seattle to record their hard-hitting follow-up album, Monolith, with producer Jack Endino (Nirvana, Soundgarden). Following the album''s 2011 release, the brothers widened their touring base, playing across the U.S. and Canada as well as in the U.K., sharing stages with a variety of acts like Rusted Root, Ozomatli, Lukas Nelson, and Railroad Earth. A third studio album, Cycle 9, appeared in 2013, followed by a pair of singles, "Dome" and "Radio," in 2015. Documenting their epic live shows, Flux Capacitor released their first concert recording, Live Spirals, Vol. 1, in 2017.&nbsp;</span></p><p></p><p><span style="color: rgb(0, 0, 0)">Flux released Set to Gravitate in 2018 and the band has grown to a four piece with the addition of Stephen Kurtz on bass.</span></p><p></p><p><span style="color: rgb(0, 0, 0)">Psychedelic rockers Lady King &amp; The Aces will kick things off. LKATA formed in the Spring of 2024. The five-piece draws influence from rock, funk, jazz and more. In their second year as a band, they released their debut self-titled album. Lady King &amp; The Aces have played several high-profile shows as well, opening for nationally-touring bands such as Jimkata, Big Shrimp and Kendall Street Company. This past April, they opened up for the Japanese rock band Kahza. Lady King &amp; The Aces were also nominated for the Central Pennsylvania Music Awards.&nbsp;&nbsp;</span></p><p></p><p><span style="color: rgb(0, 0, 0)">The show takes place at SRCC in Columbia. Doors for the show open at 7:00, with music starting shortly thereafter.&nbsp;</span></p><p></p><p><span style="color: rgb(0, 0, 0)">This concert is presented by SRCC— supporting local art, music, and creative community along the Susquehanna.</span></p><p><br></p><p><span style="color: rgb(0, 0, 0)">$15 tickets. Come appreciate local live music. Feel the vibe. Join the conspiracy.&nbsp;</span></p><p></p><p><span style="color: rgb(0, 0, 0)">Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community by facilitating creative endeavors and welcoming all to find inspiration and connection in the process." SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm.</span></p><p></p><p><span style="color: rgb(0, 0, 0)">Join the conspiracy! </span><a target="_blank" rel="noopener noreferrer nofollow" href="http://SRCCPAART.ORG"><span style="color: rgb(0, 0, 0)">SRCCPAART.ORG</span></a><span style="color: rgb(0, 0, 0)">.</span></p>'
