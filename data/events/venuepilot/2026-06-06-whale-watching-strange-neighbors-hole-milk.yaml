description: '<p><strong>ALBUM RELEASE PARTY WITH WHALE WATCHING</strong><br></p><p><em>Strange Neighbors and Hole Milk will be accompanying Whale Watching for their album release show on June 6th at Hempfield Apothetique.&nbsp;</em><br></p><p>Join us at Hempfield Apothetique on June 6th for Whale Watching’s <strong><em>Album Release Party</em></strong>. Local rockers Whale Watching will be joined by New York City’s Strange Neighbors, as well as fellow punk-rock locals, Hole Milk.&nbsp;</p><p></p><p><strong>Whale Watching</strong>, the artists behind the songs from their up-and-coming studio album “REMEMBER TO LOVE BEFORE YOU DIE” is headlining their own album release show. Whale Watching plans to put on an energetic, fun, and inviting show representing their exciting release of this album— which drops on June 1st. Whale watching is ready to play a show worthy enough to get you going!</p><p></p><p>Preceding Whale Watching are <strong>Strange Neighbors</strong>: a power-pop delight based out of New York City. Some say they sound like the love child of The Beatles and My Chemical Romance, others say they sound like Pat Benatar fronting REM. Their Dad’s say “sound good, kid.” Whatever the case, if you like cheeky lyrics over glittering guitars and bouncy beats, you won’t want to miss Strange Neighbors.</p><p></p><p>Kicking off the night is<strong> Hole Milk</strong>. They can be described in just two words: “Milk… everywhere.” You’ll have to see it to believe it.&nbsp;</p><p></p><p>The event takes place at 6:30 at Hempfield Apothetique in Lancaster, presented by SRCC— supporting local art, music, and creative community along the Susquehanna.<br></p><p>Hempfield Apothetique is one of the only cannabis consumption lounges in the state, so get ready to get elevated. Must be 21 years of age or older to attend.&nbsp;</p><p></p><p>$15 tickets. Come appreciate local live music. Feel the vibe. Join the conspiracy.&nbsp;</p><p></p><p>Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community by facilitating creative endeavors and welcoming all to find inspiration and connection in the process." SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm.<br></p><p>Join the conspiracy! SRCCPAART.ORG.</p><p><br></p>'
