description: <p><strong>“Let’s Make This Quick…” Debuts At Hempfield Apothetique</strong></p><p></p><p>Music, Comedy, Storytelling. This show has something for everybody.&nbsp;</p><p></p><p><strong>"Let's Make This Quick..."</strong> is a new variety show from Jackie Benhayon and Alex Hart, featuring local storytellers and musicians working together to create something entirely new. Each storyteller will take us on a journey through their lives and our musicians must, in the moment, craft an original song based on a story and perform it for the audience. The evening will conclude with a live performance from our special musical guest, local Keystone Emo Rockers, "<strong>Whose Hands Are These?</strong>" Music, Comedy, Yarn. Sunday, May 3rd at Hempfield Apothetique.</p><p></p><p>The event takes place at 6:30 at Hempfield Apothetique in Lancaster, presented by SRCC— supporting local art, music, and creative community along the Susquehanna.</p><p></p><p>Hempfield Apothetique is one of the only cannabis consumption lounges in the state, so get ready to get elevated. Must be 21 years of age or older to attend.&nbsp;</p><p></p><p>$15 tickets. Come appreciate local live music. Feel the vibe. Join the conspiracy.&nbsp;</p><p></p><p>Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community by facilitating creative endeavors and welcoming all to find inspiration and connection in the process." SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm.</p><p></p><p>Join the conspiracy! SRCCPAART.ORG.</p><p><br></p>
