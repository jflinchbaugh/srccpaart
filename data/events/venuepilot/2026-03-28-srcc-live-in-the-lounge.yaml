description: <h2>Lancaster is joining the conspiracy! </h2><p></p><p>Join us on Saturday, March 28th as the Susquehanna River Creative Conspiracy&nbsp;serves an evening of music, art, and atmosphere.</p><p></p><p>Step into one of the only legal cannabis consumption lounges in the country for a night where sound and creativity collide.</p><p><br>Cordy &amp; The Light bring their gritty, soulful blues-rock energy, while The Wild Hymns deliver haunting, female-fronted alternative folk that’s equal parts intimate and powerful.</p><p><br>Live painters will be creating visual art in real time as the music unfolds.</p><p><br>Presented by the Susquehanna River Creative Conspiracy (SRCC) — supporting local art, music, and creative community along the Susquehanna.</p><p><br>🎶 Live Music</p><p>🎨 Live Painters</p><p>🌿 A one-of-a-kind venue</p><p><br>$10 suggested donation. Come hang. Feel the vibe. Join the conspiracy.&nbsp;</p><p><br><br>Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community by facilitating creative endeavors and welcoming all to find inspiration and connection in the process." SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm. <br><br>Join the conspiracy! <a target="_blank" rel="noopener noreferrer nofollow" href="http://SRCCPAART.ORG">SRCCPAART.ORG</a>.&nbsp;</p>
