description: <p>Has life been weighing your body down? Do you have some kinks that just need a little attention to restore you back to normal? Well you're in luck!</p><p> Kendra Shambaugh will be leading us through a gentle, guided restorative yoga routine at Susquehanna River Creative Conspiracy studios</p><p>You'll need a yoga mat (if you have one) and a water bottle. Be sure to dress comfortably. Restorative yoga is all about slowing down and letting your body rest using props for comfortable poses with long holds. you can basically expect zero sweat!</p><p>While the event is free, an RSVP is required to reserve your space. Sign up at <a target="_blank" rel="noopener noreferrer nofollow" href="http://srccpaart.org"><strong><span>srccpaart.org</span></strong></a></p>
