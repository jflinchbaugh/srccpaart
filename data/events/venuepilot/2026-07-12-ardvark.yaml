description: '<p><strong><span style="color: rgb(255, 255, 255)">NEVER MISS A SUNDAY SHOW</span></strong></p><p><br></p><p><em><span style="color: rgb(255, 255, 255)">Aardvaark is coming to Hempfield Apothetique on Sunday, July 12th.&nbsp;</span></em></p><p><br></p><p><span style="color: rgb(255, 255, 255)">On July 12th, Aardvark will hit the stage at Hempfield Apothetique in Lancaster. Special guests will be announced soon.&nbsp;</span></p><p><br></p><p><strong><span style="color: rgb(255, 255, 255)">Aardvaark </span></strong><span style="color: rgb(255, 255, 255)">are a high-energy psychedelic rock band based in Lancaster, PA boasting a variety of original tunes filled with wild, extended improvisation. You loved the Dead. You cherished the Allman Brothers. You tolerated Phish. Let a new jam band into your life and spend an evening with Aardvaark on Sunday July 12th.&nbsp;</span></p><p><br></p><p><span style="color: rgb(255, 255, 255)">The show starts at 6:00 at Hempfield Apothetique in Lancaster, presented by SRCC— supporting local art, music, and creative community along the Susquehanna.</span></p><p><br></p><p><span style="color: rgb(255, 255, 255)">Hempfield Apothetique is one of the only cannabis consumption lounges in the state, so get ready to get </span><em><span style="color: rgb(255, 255, 255)">elevated.</span></em><span style="color: rgb(255, 255, 255)"> Must be 21 years of age or older to attend.&nbsp;</span></p><p><br></p><p><span style="color: rgb(255, 255, 255)">$12 tickets. Come appreciate local live art. Feel the vibe. Join the conspiracy.&nbsp;</span></p><p><br></p><p><span style="color: rgb(255, 255, 255)">Susquehanna River Creative Conspiracy is a 501(c)(3) nonprofit studio &amp; venue in Columbia, PA, dedicated to "Elevating community by facilitating creative endeavors and welcoming all to find inspiration and connection in the process." SRCC offers affordable fully equipped music and art studio space and more. Open studio nights every Tuesday, 7–10 pm.</span></p><p><br></p><p><span style="color: rgb(255, 255, 255)">Join the conspiracy! </span><a target="_blank" rel="noopener noreferrer nofollow" href="http://SRCCPAART.ORG"><span style="color: rgb(255, 255, 255)">SRCCPAART.ORG</span></a><span style="color: rgb(255, 255, 255)">.</span></p><p><br></p>'
