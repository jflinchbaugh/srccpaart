{{- $u := .Destination -}}
{{- if strings.HasPrefix $u "http" -}}
<img src = "{{ $u }}" alt = "{{ .Text }}" loading = "lazy">
{{- else -}}
  {{- $path := strings.TrimPrefix "/" $u -}}
  {{- $img := resources.Get (printf "static/%s" $path) -}}
  {{- if $img }}
<img src = "{{ $u }}" alt = "{{ .Text }}" width = "{{ $img.Width }}" height = "{{ $img.Height }}" loading = "lazy">
  {{- else }}
<img src = "{{ $u }}" alt = "{{ .Text }}" loading = "lazy">
  {{- end -}}
{{- end -}}
