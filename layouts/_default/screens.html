<!DOCTYPE html>
<html lang="en">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    <main>
      <h1>Finding Screens</h1>
      <div id = "list" data-screens-config = '{{ hugo.Data.screens | jsonify }}'>
      </div>
      <div id = "searching">Searching...</div>
      <div id = "refresh">
        <button id = "refresh-button">Refresh</button>
      </div>
    </main>
    {{- $screensJS := resources.Get "js/screens.js" | fingerprint }}
    <script src = "{{ $screensJS.RelPermalink }}" integrity = "{{ $screensJS.Data.Integrity }}"></script>
  </body>
</html>
