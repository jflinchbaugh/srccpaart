<!DOCTYPE html>
<html lang="en">
  <head>
    {{ partial "head.html" . }}
    <style>
     div#list div {
       padding: 1ex;
     }
    </style>
  </head>
  <body>
    <h1>Finding Screens</h1>
    <div id = "list">
    </div>
    <div id = "searching">Searching...</div>
    <div id = "refresh">
      <button onClick = "location.reload(true);">Refresh</button>
    </div>
    <script>
      const baseUrl = "http://192.168.0"
      let foundCount = 0;
      function reqListener(ev) {
         const url = ev.srcElement.responseURL;
         const screenUrl = url.substring(0, url.length - 12);
         const identifier = ev.srcElement.responseText;
         const item = document.createElement("div");
         item.innerHTML = `<a target="_blank"
                              href="${screenUrl}">
           ${identifier} (${screenUrl})</a>`

         const list = document.getElementById("list");
         list.appendChild(item);
         foundCount ++;
      }

      for (i = 1; i < 256; i++) {
         const req = new XMLHttpRequest();
         req.addEventListener("load", reqListener);
         req.open("GET", `${baseUrl}.${i}:8080/app-identity`);
         req.send();
      }
      setTimeout(function() {
         document.getElementById("searching").remove();

         if (foundCount <= 0) {
            const list = document.getElementById("list");
            const item1 = document.createElement("div");
            item1.innerHTML = `<a target="_blank"
                                  href="http://192.168.0.19:8080/">
                                  backup - Event Room</a>`
            list.appendChild(item1);
            const item2 = document.createElement("div");
            item2.innerHTML = `<a target="_blank"
                                  href="http://192.168.0.29:8080/">
                                  backup - Lounge</a>`
            list.appendChild(item2);
         }
      }, 15000);
    </script>
  </body>
</html>
