<section class = "events">
  {{- $events := (merge
                   hugo.Data.events.art
                   hugo.Data.events.music
                   hugo.Data.events.venuepilot)
                 | sort | collections.Reverse -}}
  {{- range $index, $element := $events}}
    {{ partial "event.html" $element }}
  {{- end }}
</section>
